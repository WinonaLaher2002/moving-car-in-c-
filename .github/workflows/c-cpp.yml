name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install SFML
      run: sudo apt-get update && sudo apt-get install -y libsfml-dev

    - name: Build
      run: g++ -o main main.cpp -lsfml-graphics -lsfml-window -lsfml-system

    - name: Check binary exists
      run: ls -la main
